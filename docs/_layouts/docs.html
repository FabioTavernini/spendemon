<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | escape }}">
    <script>
      (function () {
        var storedTheme = localStorage.getItem("spendemon-docs-theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = storedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/docs.css' | relative_url }}">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="topnav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Docs</a>
          <a href="{{ '/info/' | relative_url }}" {% if page.url == '/info/' %}aria-current="page"{% endif %}>Info</a>
          <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}aria-current="page"{% endif %}>About</a>
          <a href="https://github.com/FabioTavernini/spendemon" target="_blank" rel="noreferrer">GitHub</a>
          <button class="theme-toggle" type="button" aria-label="Toggle dark mode" data-theme-toggle>
            <span data-theme-label>Dark mode</span>
          </button>
        </nav>
      </div>
    </header>

    <div class="docs-shell">
      <aside class="sidebar" aria-label="Table of contents">
        <p class="sidebar__eyebrow">{{ page.sidebar_title | default: "Documentation" }}</p>
        <h2 class="sidebar__title">{{ page.title }}</h2>
        {% if page.toc %}
        <ul class="sidebar__list">
          {% for item in page.toc %}
          <li>
            <a href="{{ item.url }}">{{ item.title }}</a>
          </li>
          {% endfor %}
        </ul>
        {% endif %}
      </aside>

      <main class="content">
        <div class="content__inner">
          {% if page.lead %}
          <p class="content__lead">{{ page.lead }}</p>
          {% endif %}
          {{ content }}
        </div>
      </main>
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var button = document.querySelector("[data-theme-toggle]");
        var label = document.querySelector("[data-theme-label]");

        if (!button || !label) return;

        function syncLabel(theme) {
          label.textContent = theme === "dark" ? "Light mode" : "Dark mode";
          button.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
        }

        syncLabel(root.getAttribute("data-theme") || "light");

        button.addEventListener("click", function () {
          var currentTheme = root.getAttribute("data-theme") || "light";
          var nextTheme = currentTheme === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", nextTheme);
          localStorage.setItem("spendemon-docs-theme", nextTheme);
          syncLabel(nextTheme);
        });
      })();
    </script>
  </body>
</html>
