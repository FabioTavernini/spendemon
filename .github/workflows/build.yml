name: Build and publish (Docker + Helm)

on:
  push:
    branches: ['main']
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase names
        id: vars
        shell: bash
        run: |
          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "repo=${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER_LC}" >> "$GITHUB_OUTPUT"

      - name: Extract versions
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_VERSION="${GITHUB_REF#refs/tags/v}"
            IMAGE_TAG="${RELEASE_VERSION}"
            CHART_VERSION="${RELEASE_VERSION}"
            APP_VERSION="${RELEASE_VERSION}"
          else
            IMAGE_TAG="latest"
            CHART_VERSION="0.0.0-dev"
            APP_VERSION="latest"
          fi

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo }}:${{ steps.version.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.repo }}:latest

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Set chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.chart_version }}/" charts/spendemon/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.app_version }}\"/" charts/spendemon/Chart.yaml

      - name: Package Helm chart
        run: helm package charts/spendemon

      - name: Push Helm chart
        run: |
          helm push spendemon-${{ steps.version.outputs.chart_version }}.tgz \
            oci://ghcr.io/${{ steps.vars.outputs.owner }}