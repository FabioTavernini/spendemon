image:
  repository: ghcr.io/fabiotavernini/spendemon
  tag: "latest"
  pullPolicy: IfNotPresent
  imagePullSecret: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  hosts:
    - host: spendemon.local
      paths:
        - path: /
          pathType: Prefix

resources: {}

settings:
  mountPath: "/app/settings.yaml"
  content: |
    clusters:
      - name: cluster-1
        prometheusUrl: http://prometheus-service.prometheus.svc.cluster.local:80
      # - name: cluster-2
      #   prometheusUrl: http://localhost:9090

    costs:
      cpuCore: 10
      memoryGb: 20
      storageGb: 5



