apiVersion: v1
kind: ConfigMap
metadata:
  name: spendemon-settings-template
data:
  settings.yaml: |
    clusters:
      - name: "cluster-1"
        prometheusUrl: "http://prometheus-service.prometheus.svc.cluster.local:80"

    costs:
      cpuCore: 10
      memoryGb: 20
      storageGb: 5

    HA:
      enabled: false

    sharednamespaces:
      - "kube-system"

    oidc:
      enabled: false
      issuer: ""
      clientId: ""
      clientSecret: ""
      adminGroup: "admin"
      viewerGroup: "viewer"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spendemon-settings
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spendemon
  labels:
    app: spendemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spendemon
  template:
    metadata:
      labels:
        app: spendemon
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: seed-settings
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/settings.yaml ]; then
                cp /seed/settings.yaml /data/settings.yaml
              fi
          volumeMounts:
            - name: settings
              mountPath: /data
            - name: settings-template
              mountPath: /seed
      containers:
        - name: spendemon
          image: ghcr.io/fabiotavernini/spendemon:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SETTINGS_FILE_PATH
              value: /data/settings.yaml
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: settings
              mountPath: /data
      volumes:
        - name: settings
          persistentVolumeClaim:
            claimName: spendemon-settings
        - name: settings-template
          configMap:
            name: spendemon-settings-template
---
apiVersion: v1
kind: Service
metadata:
  name: spendemon
  labels:
    app: spendemon
spec:
  type: ClusterIP
  selector:
    app: spendemon
  ports:
    - name: http
      port: 3000
      targetPort: 3000
