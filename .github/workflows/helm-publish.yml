name: Package and publish Helm chart

on:
  push:
    branches: ['main']
    tags: ['v*.*.*']
    paths:
      - 'charts/**'
      - '.github/workflows/helm-publish.yml'

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner name
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${OWNER_LC}" >> "$GITHUB_OUTPUT"

      - name: Extract chart versions
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_VERSION="${GITHUB_REF#refs/tags/v}"
            CHART_VERSION="${RELEASE_VERSION}"
            APP_VERSION="${RELEASE_VERSION}"
          else
            CHART_VERSION="0.0.0-dev"
            APP_VERSION="latest"
          fi

          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Set chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.chart_version }}/" charts/spendemon/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.app_version }}\"/" charts/spendemon/Chart.yaml

      - name: Package Helm chart
        run: helm package charts/spendemon

      - name: Push Helm chart
        run: |
          helm push spendemon-${{ steps.version.outputs.chart_version }}.tgz \
            oci://ghcr.io/${{ steps.vars.outputs.owner }}/charts