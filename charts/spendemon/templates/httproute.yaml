{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "spendemon.fullname" . }}-route
  labels:
    app: {{ include "spendemon.name" . }}
spec:
  parentRefs:
{{- range .Values.gateway.parentRefs }}
    - name: {{ .name }}
{{- if .namespace }}
      namespace: {{ .namespace }}
{{- end }}
{{- end }}

  hostnames:
{{- range .Values.gateway.hosts }}
    - {{ . | quote }}
{{- end }}

  rules:
{{- $root := . }}
{{- range .Values.gateway.rules }}
    - matches:
{{- range .matches }}
        - path:
            type: {{ .pathType | default "PathPrefix" }}
            value: {{ .path | quote }}
{{- end }}
      backendRefs:
        - name: {{ include "spendemon.fullname" $root }}
          port: {{ $root.Values.service.port }}
{{- end }}
{{- end }}